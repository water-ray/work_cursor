name: Build sing-box Libraries

on:
  workflow_dispatch:
    inputs:
      sing_box_ref:
        description: "sing-box tag/branch/commit"
        required: true
        default: "v1.13.2"
        type: string
      release_tag:
        description: "Release tag (optional)"
        required: false
        default: ""
        type: string
      release_name:
        description: "Release name (optional)"
        required: false
        default: ""
        type: string
  push:
    tags:
      - "sb-libs-v*"

permissions:
  contents: write

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      sb_ref: ${{ steps.meta.outputs.sb_ref }}
      release_tag: ${{ steps.meta.outputs.release_tag }}
      release_name: ${{ steps.meta.outputs.release_name }}
    steps:
      - name: Resolve build metadata
        id: meta
        shell: bash
        env:
          INPUT_SB_REF: ${{ github.event.inputs.sing_box_ref }}
          INPUT_RELEASE_TAG: ${{ github.event.inputs.release_tag }}
          INPUT_RELEASE_NAME: ${{ github.event.inputs.release_name }}
        run: |
          set -euo pipefail
          if [[ "${GITHUB_EVENT_NAME}" == "push" ]]; then
            release_tag="${GITHUB_REF_NAME}"
            sb_ref="v1.13.2"
          else
            sb_ref="${INPUT_SB_REF:-v1.13.2}"
            release_tag="${INPUT_RELEASE_TAG}"
            if [[ -z "${release_tag}" ]]; then
              release_tag="sb-libs-$(date +%Y%m%d-%H%M%S)"
            fi
          fi

          release_name="${INPUT_RELEASE_NAME}"
          if [[ -z "${release_name}" ]]; then
            release_name="sing-box libs ${release_tag}"
          fi

          echo "sb_ref=${sb_ref}" >> "$GITHUB_OUTPUT"
          echo "release_tag=${release_tag}" >> "$GITHUB_OUTPUT"
          echo "release_name=${release_name}" >> "$GITHUB_OUTPUT"

  build_windows_dll:
    name: Build Windows DLL
    runs-on: windows-latest
    needs: prepare
    steps:
      - name: Checkout wateray
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25.x"

      - name: Setup MinGW
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            mingw-w64-x86_64-gcc

      - name: Add MinGW to PATH
        shell: pwsh
        run: |
          "C:\msys64\mingw64\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Build c-shared DLL
        shell: pwsh
        working-directory: core
        run: |
          go get "github.com/sagernet/sing-box@${{ needs.prepare.outputs.sb_ref }}"
          go mod tidy
          New-Item -ItemType Directory -Force -Path "..\dist\windows" | Out-Null
          go build -tags "cshared,sbcore" -buildmode=c-shared -trimpath -ldflags "-s -w" -o "..\dist\windows\wateray_core.dll" "./cmd/wateray_core"
          if (!(Test-Path "..\dist\windows\wateray_core.h")) { throw "missing generated header: wateray_core.h" }
          Compress-Archive -Path "..\dist\windows\wateray_core.dll", "..\dist\windows\wateray_core.h" -DestinationPath "..\dist\wateray-core-windows-amd64.zip" -Force

      - name: Upload Windows DLL package
        uses: actions/upload-artifact@v4
        with:
          name: wateray-core-windows-amd64
          path: dist/wateray-core-windows-amd64.zip

  build_android_so:
    name: Build Android SO
    runs-on: ubuntu-latest
    needs: prepare
    steps:
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25.x"

      - name: Setup Android NDK
        id: setup-ndk
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r28

      - name: Setup OpenJDK 17
        run: |
          sudo apt-get update
          sudo apt-get install -y openjdk-17-jdk-headless unzip zip
          /usr/lib/jvm/java-17-openjdk-amd64/bin/java --version

      - name: Checkout sing-box source
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p work/sing-box
          git -C work/sing-box init
          git -C work/sing-box remote add origin https://github.com/SagerNet/sing-box.git
          git -C work/sing-box fetch --depth=1 origin "${{ needs.prepare.outputs.sb_ref }}"
          git -C work/sing-box checkout FETCH_HEAD

      - name: Build libbox Android AAR
        shell: bash
        working-directory: work/sing-box
        env:
          JAVA_HOME: /usr/lib/jvm/java-17-openjdk-amd64
          ANDROID_NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}
        run: |
          set -euo pipefail
          go install -v github.com/sagernet/gomobile/cmd/gomobile@v0.1.11
          go install -v github.com/sagernet/gomobile/cmd/gobind@v0.1.11
          export PATH="$PATH:$(go env GOPATH)/bin"
          go run ./cmd/internal/build_libbox -target android

      - name: Extract SO files
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist/android/tmp-main dist/android/tmp-legacy
          unzip -q work/sing-box/libbox.aar "jni/*/libbox.so" -d dist/android/tmp-main
          unzip -q work/sing-box/libbox-legacy.aar "jni/*/libbox.so" -d dist/android/tmp-legacy

          for abi in arm64-v8a armeabi-v7a x86_64 x86; do
            if [[ -f "dist/android/tmp-main/jni/${abi}/libbox.so" ]]; then
              cp "dist/android/tmp-main/jni/${abi}/libbox.so" "dist/android/libbox-${abi}.so"
            fi
            if [[ -f "dist/android/tmp-legacy/jni/${abi}/libbox.so" ]]; then
              cp "dist/android/tmp-legacy/jni/${abi}/libbox.so" "dist/android/libbox-legacy-${abi}.so"
            fi
          done

          cp work/sing-box/libbox.aar dist/android/
          cp work/sing-box/libbox-legacy.aar dist/android/
          rm -rf dist/android/tmp-main dist/android/tmp-legacy

          (cd dist/android && zip -r ../wateray-core-android-so.zip .)

      - name: Upload Android SO package
        uses: actions/upload-artifact@v4
        with:
          name: wateray-core-android-so
          path: dist/wateray-core-android-so.zip

  build_ios_xcframework:
    name: Build iOS XCFramework
    runs-on: macos-latest
    needs: prepare
    steps:
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25.x"

      - name: Checkout sing-box source
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p work/sing-box
          git -C work/sing-box init
          git -C work/sing-box remote add origin https://github.com/SagerNet/sing-box.git
          git -C work/sing-box fetch --depth=1 origin "${{ needs.prepare.outputs.sb_ref }}"
          git -C work/sing-box checkout FETCH_HEAD

      - name: Build Libbox.xcframework
        shell: bash
        working-directory: work/sing-box
        run: |
          set -euo pipefail
          go install -v github.com/sagernet/gomobile/cmd/gomobile@v0.1.11
          go install -v github.com/sagernet/gomobile/cmd/gobind@v0.1.11
          export PATH="$PATH:$(go env GOPATH)/bin"
          go run ./cmd/internal/build_libbox -target apple -platform ios,iossimulator
          mkdir -p "$GITHUB_WORKSPACE/dist"
          ditto -c -k --sequesterRsrc --keepParent Libbox.xcframework "$GITHUB_WORKSPACE/dist/wateray-core-ios-xcframework.zip"

      - name: Upload iOS XCFramework package
        uses: actions/upload-artifact@v4
        with:
          name: wateray-core-ios-xcframework
          path: dist/wateray-core-ios-xcframework.zip

  publish_release:
    name: Publish Release
    runs-on: ubuntu-latest
    needs:
      - prepare
      - build_windows_dll
      - build_android_so
      - build_ios_xcframework
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v5
        with:
          path: dist
          merge-multiple: true

      - name: Generate checksum
        shell: bash
        run: |
          set -euo pipefail
          cd dist
          sha256sum *.zip > SHA256SUMS.txt

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare.outputs.release_tag }}
          name: ${{ needs.prepare.outputs.release_name }}
          target_commitish: ${{ github.sha }}
          generate_release_notes: true
          body: |
            Automated sing-box library build for wateray.

            - sing-box ref: `${{ needs.prepare.outputs.sb_ref }}`
            - artifacts:
              - `wateray-core-windows-amd64.zip` (DLL + header)
              - `wateray-core-android-so.zip` (SO + AAR)
              - `wateray-core-ios-xcframework.zip` (XCFramework)
          files: |
            dist/*.zip
            dist/SHA256SUMS.txt
