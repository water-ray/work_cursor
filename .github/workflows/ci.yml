name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  tauri_frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: TauriApp
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: TauriApp/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

  go:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: core
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: core/go.mod

      - name: Run tests
        run: go test ./...
