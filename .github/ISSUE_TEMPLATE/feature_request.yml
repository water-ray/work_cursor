name: Feature request
description: Propose an idea or enhancement
title: "[Feature] "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem statement
      description: What user problem are you trying to solve?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What should be added or changed?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any alternative options you considered
    validations:
      required: false

  - type: textarea
    id: scope
    attributes:
      label: Scope and impact
      description: Which module is affected (`app`, `core`, `scripts`)?
    validations:
      required: true
